<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 348" style="font-family:'JetBrains Mono',monospace;display:block">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0,8 3.5,0 7" fill="#8b949e"/>
    </marker>
  </defs>
  <rect width="700" height="348" rx="10" fill="#161b22"/>

  <!-- DNS -->
  <rect x="275" y="14" width="150" height="38" rx="6" fill="#21262d" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="350" y="29" fill="#38bdf8" font-size="9" text-anchor="middle">DNS</text>
  <text x="350" y="44" fill="#e6edf3" font-size="11" text-anchor="middle">BIND (named)</text>

  <!-- DNS→HAProxy -->
  <line x1="350" y1="52" x2="350" y2="86" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- HAProxy -->
  <rect x="230" y="86" width="240" height="38" rx="6" fill="#21262d" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="350" y="101" fill="#38bdf8" font-size="9" text-anchor="middle">LOAD BALANCER</text>
  <text x="350" y="116" fill="#e6edf3" font-size="11" text-anchor="middle">HAProxy</text>

  <!-- HAProxy→WEB×3 -->
  <line x1="265" y1="124" x2="140" y2="164" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="350" y1="124" x2="350" y2="164" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="435" y1="124" x2="562" y2="164" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Pacemaker bracket -->
  <rect x="40" y="160" width="622" height="46" rx="6" fill="rgba(52,211,153,0.04)" stroke="#30363d" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="656" y="172" fill="#34d399" font-size="8" text-anchor="end">Pacemaker</text>
  <text x="656" y="183" fill="#34d399" font-size="8" text-anchor="end">Active-Active</text>

  <!-- WEB1 -->
  <rect x="45" y="164" width="130" height="38" rx="6" fill="#21262d" stroke="#34d399" stroke-width="1.5"/>
  <text x="110" y="179" fill="#34d399" font-size="9" text-anchor="middle">WEB 1</text>
  <text x="110" y="194" fill="#e6edf3" font-size="10.5" text-anchor="middle">Apache + PHP</text>

  <!-- WEB2 -->
  <rect x="285" y="164" width="130" height="38" rx="6" fill="#21262d" stroke="#34d399" stroke-width="1.5"/>
  <text x="350" y="179" fill="#34d399" font-size="9" text-anchor="middle">WEB 2</text>
  <text x="350" y="194" fill="#e6edf3" font-size="10.5" text-anchor="middle">Apache + PHP</text>

  <!-- WEB3 -->
  <rect x="527" y="164" width="130" height="38" rx="6" fill="#21262d" stroke="#34d399" stroke-width="1.5"/>
  <text x="592" y="179" fill="#34d399" font-size="9" text-anchor="middle">WEB 3</text>
  <text x="592" y="194" fill="#e6edf3" font-size="10.5" text-anchor="middle">Apache + PHP</text>

  <!-- NFS mount arrows (dashed) WEB→NAS -->
  <line x1="110" y1="202" x2="252" y2="260" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#a)"/>
  <line x1="350" y1="202" x2="315" y2="260" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#a)"/>
  <line x1="592" y1="202" x2="378" y2="260" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#a)"/>
  <text x="175" y="238" fill="#8b949e" font-size="8.5" text-anchor="middle">NFS mount</text>

  <!-- NAS -->
  <rect x="208" y="260" width="175" height="38" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="295" y="275" fill="#8b949e" font-size="9" text-anchor="middle">NAS</text>
  <text x="295" y="291" fill="#e6edf3" font-size="11" text-anchor="middle">NFS Server</text>

  <!-- SAN -->
  <rect x="490" y="250" width="145" height="38" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="562" y="265" fill="#8b949e" font-size="9" text-anchor="middle">SAN</text>
  <text x="562" y="281" fill="#e6edf3" font-size="11" text-anchor="middle">NVMe/TCP</text>

  <!-- SAN→DB arrow -->
  <line x1="562" y1="288" x2="562" y2="302" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- DB -->
  <rect x="490" y="302" width="145" height="38" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="562" y="317" fill="#8b949e" font-size="9" text-anchor="middle">DATABASE</text>
  <text x="562" y="333" fill="#e6edf3" font-size="11" text-anchor="middle">MySQL 8</text>
</svg>
