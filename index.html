<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello, World!</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a;         /* Deep Slate */
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-1: #3b82f6;         /* Blue */
            --accent-2: #8b5cf6;         /* Purple */
            --accent-3: #ec4899;         /* Pink */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Background Animated Blobs */
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.5;
            animation: moveBlobs 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 50%;
        }

        .blob-1 {
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: linear-gradient(135deg, var(--accent-1), transparent);
            animation-delay: 0s;
        }

        .blob-2 {
            bottom: -20%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: linear-gradient(135deg, var(--accent-2), transparent);
            animation-delay: -5s;
        }

        .blob-3 {
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, var(--accent-3), transparent 70%);
            animation-delay: -10s;
        }

        @keyframes moveBlobs {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            50% { transform: translate(10%, 10%) scale(1.1) rotate(45deg); }
            100% { transform: translate(-5%, -15%) scale(0.9) rotate(-45deg); }
        }

        /* Glassmorphism Card Container */
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 4rem 3rem;
            text-align: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        box-shadow 0.4s ease, border 0.4s ease;
            max-width: 90%;
            width: 480px;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* Typography */
        h1 {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }

        p {
            font-size: 1.15rem;
            color: var(--text-secondary);
            font-weight: 300;
            line-height: 1.6;
        }

        /* Interactive Badge */
        .badge {
            display: inline-flex;
            align-items: center;
            margin-top: 2.5rem;
            padding: 0.6rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            gap: 8px;
        }

        .badge::before {
            content: '';
            display: block;
            width: 8px;
            height: 8px;
            background-color: var(--accent-1);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-1);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        .badge:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        /* Dynamic Mouse Follower Aura */
        #cursor-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 60%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
            transform: translate(-50%, -50%);
            transition: opacity 0.5s ease;
            opacity: 0;
        }
    </style>
</head>
<body>
    <!-- Ambient Background -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    
    <!-- Interactive Aura effect -->
    <div id="cursor-glow"></div>

    <!-- Main Content -->
    <div class="card">
        <h1>Hello,<br>World!</h1>
        <p>단일 HTML 파일로 구현된<br>모던하고 감각적인 인터페이스</p>
        <div class="badge">Welcome</div>
    </div>

    <!-- Simple interaction script -->
    <script>
        const glow = document.getElementById('cursor-glow');
        let hideTimeout;

        document.addEventListener('mousemove', (e) => {
            glow.style.opacity = '1';
            glow.style.left = `${e.clientX}px`;
            glow.style.top = `${e.clientY}px`;

            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => {
                glow.style.opacity = '0';
            }, 1000);
        });

        document.addEventListener('mouseleave', () => {
            glow.style.opacity = '0';
        });
    </script>
</body>
</html>
